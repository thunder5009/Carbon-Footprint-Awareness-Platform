name: Enterprise Testing & CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

  unit-integration-tests:
    name: Unit & Integration (Vitest)
    runs-on: ubuntu-latest
    needs: validate
    
    # Ephemeral PostgreSQL database for Prisma integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma_password
          POSTGRES_DB: carbontrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Apply Database Migrations (Prisma)
        run: npx prisma db push
        env:
          DATABASE_URL: "postgresql://prisma:prisma_password@localhost:5432/carbontrack_test?schema=public"

      - name: Run Vitest with Coverage
        run: npx vitest run --coverage
        env:
          DATABASE_URL: "postgresql://prisma:prisma_password@localhost:5432/carbontrack_test?schema=public"
          
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-and-e2e:
    name: Build & E2E (Playwright)
    runs-on: ubuntu-latest
    needs: validate
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma_password
          POSTGRES_DB: carbontrack_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply Database Migrations (Prisma)
        run: npx prisma db push
        env:
          DATABASE_URL: "postgresql://prisma:prisma_password@localhost:5432/carbontrack_test?schema=public"

      - name: Build Next.js App
        run: npm run build
        env:
          DATABASE_URL: "postgresql://prisma:prisma_password@localhost:5432/carbontrack_test?schema=public"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: npx playwright test
        env:
          DATABASE_URL: "postgresql://prisma:prisma_password@localhost:5432/carbontrack_test?schema=public"
          
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  lighthouse:
    name: Performance (Lighthouse CI)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy_db"

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
